spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Email/Gmail SMTP Configuration  

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${PORT:8080}

medsafe:
  jwt:
    secret: ${JWT_SECRET}
    expirationMs: 86400000

ai:
  api:
    key: ${AI_API_KEY}
    url: ${AI_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}
    model: ${AI_MODEL:meta/llama-3.1-8b-instruct}
